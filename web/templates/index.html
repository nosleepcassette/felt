<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>felt</title>
 <link rel="stylesheet" href="/static/style.css">
</head>
<body>
 <div id="app">

 <header>
 <div class="header-left">
 <span class="logo">felt</span>
 <span class="badge" id="auth-status">checking auth...</span>
 </div>
 </header>

 <nav>
 <button class="tab active" data-tab="likes">liked you</button>
 <button class="tab" data-tab="pings">pinged you</button>
 <button class="tab" data-tab="matches">matches</button>
 <button class="tab" data-tab="discovery">discovery</button>
 </nav>

 <div id="error-banner" class="error-banner hidden"></div>

 <main>
 <div id="tab-likes" class="tab-content active">
 <div class="loading">loading...</div>
 <div class="card-grid" id="likes-grid"></div>
 </div>

 <div id="tab-pings" class="tab-content">
 <div class="loading">loading...</div>
 <div class="card-grid" id="pings-grid"></div>
 </div>

 <div id="tab-matches" class="tab-content">
 <div class="loading">loading...</div>
 <div class="card-grid" id="matches-grid"></div>
 </div>

 <div id="tab-discovery" class="tab-content">
 <div class="loading">loading...</div>
 <div class="card-grid" id="discovery-grid"></div>
 </div>
 </main>

 <!-- Profile detail modal -->
 <div id="modal" class="modal hidden">
 <div class="modal-backdrop" id="modal-backdrop"></div>
 <div class="modal-content">
 <button class="modal-close" id="modal-close">×</button>
 <div id="modal-body"></div>
 </div>
 </div>

 </div>

 <script src="/static/app.js"></script>
</body>
</html>
